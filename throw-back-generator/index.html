      btn.dataset.value = text;
      btn.dataset.category = category;
      btn.dataset.colorIndex = index;
      
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        toggleSelection(btn, text, category);
      });
      
      return btn;
    }

    function toggleSelection(btn, text, category) {
      const isSelected = btn.classList.contains("selected");
      const colorSet = colorClasses[parseInt(btn.dataset.colorIndex) % colorClasses.length];

      if (category === "background") {
        // Background is single selection
        document.querySelectorAll("[data-category='background']").forEach(b => {
          b.classList.remove("selected");
          const idx = parseInt(b.dataset.colorIndex) % colorClasses.length;
          const cs = colorClasses[idx];
          b.classList.remove(cs.selectedBg.split(" ")[0], cs.selectedBg.split(" ")[1]);
          b.classList.add(cs.bg.split(" ")[0], cs.bg.split(" ")[1]);
          b.style.borderColor = "transparent";
        });
        
        if (!isSelected) {
          btn.classList.add("selected");
          btn.classList.remove(colorSet.bg.split(" ")[0], colorSet.bg.split(" ")[1]);
          btn.classList.add(colorSet.selectedBg.split(" ")[0], colorSet.selectedBg.split(" ")[1]);
          backgroundSelection = text;
        } else {
          backgroundSelection = null;
        }
      } else {
        // Multi-select for other categories including presets
        if (isSelected) {
          btn.classList.remove("selected");
          btn.classList.remove(colorSet.selectedBg.split(" ")[0], colorSet.selectedBg.split(" ")[1]);
          btn.classList.add(colorSet.bg.split(" ")[0], colorSet.bg.split(" ")[1]);
          btn.style.borderColor = "transparent";
          if (presetSelections[category]) {
            presetSelections[category].delete(text);
          }
          if (imageSelections[`image${btn.dataset.imageNum}`] && imageSelections[`image${btn.dataset.imageNum}`][category]) {
            imageSelections[`image${btn.dataset.imageNum}`][category].delete(text);
          }
        } else {
          btn.classList.add("selected");
          btn.classList.remove(colorSet.bg.split(" ")[0], colorSet.bg.split(" ")[1]);
          btn.classList.add(colorSet.selectedBg.split(" ")[0], colorSet.selectedBg.split(" ")[1]);
          btn.style.borderColor = "#000";
          if (presetSelections[category]) {
            presetSelections[category].add(text);
          }
          if (imageSelections[`image${btn.dataset.imageNum}`] && imageSelections[`image${btn.dataset.imageNum}`][category]) {
            imageSelections[`image${btn.dataset.imageNum}`][category].add(text);
          }
        }
      }
    }

    function setupPhotoUpload() {
      const uploadBtn = document.getElementById("upload-btn");
      const photoInput = document.getElementById("photo-upload");
      const photoPreview = document.getElementById("photo-preview");
      const removePhotoBtn = document.getElementById("remove-photo-btn");

      uploadBtn.addEventListener("click", (e) => {
        e.preventDefault();
        photoInput.click();
      });

      photoInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            uploadedPhotoURL = event.target.result;
            photoPreview.src = uploadedPhotoURL;
            photoPreview.classList.remove("hidden");
            removePhotoBtn.classList.remove("hidden");
            uploadBtn.textContent = "🖼️ Change Photo";
          };
          reader.readAsDataURL(file);
        }
      });

      removePhotoBtn.addEventListener("click", (e) => {
        e.preventDefault();
        uploadedPhotoURL = null;
        photoInput.value = "";
        photoPreview.classList.add("hidden");
        removePhotoBtn.classList.add("hidden");
        uploadBtn.textContent = "🖼️ Choose Photo";
      });
    }

    function randomizeSelections() {
      clearAllSelections();
      
      // Randomize background
      const bgOptions = document.querySelectorAll("[data-category='background']");
      const randomBg = bgOptions[Math.floor(Math.random() * bgOptions.length)];
      randomBg.click();

      // Randomize layout
      const layouts = ["single", "double", "collage"];
      const randomLayout = layouts[Math.floor(Math.random() * layouts.length)];
      document.querySelector(`[data-layout="${randomLayout}"]`).click();

      // Randomize presets immediately (they exist now)
      Array.from(document.querySelectorAll("#era-blend-options button")).forEach(btn => { if (Math.random() < 0.5) btn.click(); });
      Array.from(document.querySelectorAll("#theme-options button")).forEach(btn => { if (Math.random() < 0.4) btn.click(); });
      Array.from(document.querySelectorAll("#typography-options button")).forEach(btn => { if (Math.random() < 0.4) btn.click(); });
      Array.from(document.querySelectorAll("#character-mix-options button")).forEach(btn => { if (Math.random() < 0.5) btn.click(); });
      Array.from(document.querySelectorAll("#colors-props-options button")).forEach(btn => { if (Math.random() < 0.5) btn.click(); });

      // Random image styles after layout creates sections
      setTimeout(() => {
        Object.keys(imageSelections).forEach(imageKey => {
          const imageNum = imageKey.replace("image", "");
          
          const charBtns = document.querySelectorAll(`#char-options-${imageNum} button`);
          charBtns.forEach(btn => { if (Math.random() < 0.6) btn.click(); });

          const eraBtns = document.querySelectorAll(`#era-options-${imageNum} button`);
          eraBtns.forEach(btn => { if (Math.random() < 0.5) btn.click(); });

          const propsBtns = document.querySelectorAll(`#props-options-${imageNum} button`);
          propsBtns.forEach(btn => { if (Math.random() < 0.4) btn.click(); });

          const typoBtns = document.querySelectorAll(`#typo-options-${imageNum} button`);
          typoBtns.forEach(btn => { if (Math.random() < 0.3) btn.click(); });
        });
      }, 50);
    }

      imageSelections = {};
      backgroundSelection = null;
      presetSelections = {
        eraBlend: new Set(),
        theme: new Set(),
        typography: new Set(),
        characterMix: new Set(),
        colorsProps: new Set()
      };
      
      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.classList.remove("selected");
        const colorSet = colorClasses[parseInt(btn.dataset.colorIndex) % colorClasses.length];
        btn.classList.remove(colorSet.selectedBg.split(" ")[0], colorSet.selectedBg.split(" ")[1]);
        btn.classList.add(colorSet.bg.split(" ")[0], colorSet.bg.split(" ")[1]);

      document.querySelectorAll(".custom-input").forEach(input => input.value = "");
      
      document.getElementById("output-section").classList.add("hidden");

    function generatePrompt() {
      const title = document.getElementById("title-input").value.trim();
      const subtitle = document.getElementById("subtitle-input").value.trim();
      
      let prompt = "";
      
      if (title || subtitle) {
        prompt = `Create a throwback nostalgia collage image`;
        if (title) prompt += ` with the title "${title}"`;
        if (subtitle) prompt += ` and subtitle "${subtitle}"`;
        prompt += `.\n\n`;
      } else {
        prompt = `Create a throwback nostalgia collage image (no text/title).\n\n`;
      }

      if (selectedLayout) {
        prompt += `**Layout Type:** ${selectedLayout.charAt(0).toUpperCase() + selectedLayout.slice(1)} (${layoutDescriptions[selectedLayout]})\n\n`;
      }

      if (backgroundSelection) {
        prompt += `**Shared Background:** ${backgroundSelection}\n\n`;
      }

      // Preset selections
      if (presetSelections.eraBlend.size > 0) {
        prompt += `**Era/Decade Blend:** ${[...presetSelections.eraBlend].join(", ")}\n`;
      }
      if (presetSelections.theme.size > 0) {
        prompt += `**Theme/Vibe:** ${[...presetSelections.theme].join(", ")}\n`;
      }
      if (presetSelections.typography.size > 0) {
        prompt += `**Typography Style:** ${[...presetSelections.typography].join(", ")}\n`;
      }
      if (presetSelections.characterMix.size > 0) {
        prompt += `**Character Mix:** ${[...presetSelections.characterMix].join(", ")}\n`;
      }
      if (presetSelections.colorsProps.size > 0) {
        prompt += `**Colors + Props + Finish:** ${[...presetSelections.colorsProps].join(", ")}\n`;
      }
      if (presetSelections.eraBlend.size > 0 || presetSelections.theme.size > 0 || presetSelections.typography.size > 0 || presetSelections.characterMix.size > 0 || presetSelections.colorsProps.size > 0) {
        prompt += "\n";
      }

      if (uploadedPhotoURL) {
        prompt += `**Include:** A user-uploaded photo integrated stylishly into the composition\n\n`;
      }

      // Image-specific styles
      Object.keys(imageSelections).forEach((imageKey, idx) => {
        const imageNum = idx + 1;
        const selection = imageSelections[imageKey];
        
        if (selection.character.size > 0 || selection.era.size > 0 || selection.props.size > 0 || selection.typo.size > 0 || selection.custom) {
          prompt += `**Image ${imageNum} Style:**\n`;
          
          if (selection.character.size > 0) {
            prompt += `- Characters: ${[...selection.character].join(", ")}\n`;
          }
          if (selection.era.size > 0) {
            prompt += `- Era: ${[...selection.era].join(", ")}\n`;
          }
          if (selection.props.size > 0) {
            prompt += `- Props/Elements: ${[...selection.props].join(", ")}\n`;
          }
          if (selection.typo.size > 0) {
            prompt += `- Typography: ${[...selection.typo].join(", ")}\n`;
          }
          if (selection.custom) {
            prompt += `- Custom: ${selection.custom}\n`;
          }
          
          prompt += "\n";
        }
      });
      
      prompt += `Style: High-quality digital illustration, vibrant colors, retro nostalgic aesthetic, all styles blended together in one unified frame, suitable for poster or collage artwork.`;
      
      document.getElementById("prompt-output").textContent = prompt;
      document.getElementById("output-section").classList.remove("hidden");
      document.getElementById("output-section").scrollIntoView({ behavior: "smooth" });
    }

    function copyToClipboard() {
      const promptText = document.getElementById("prompt-output").textContent;
      const textarea = document.createElement("textarea");
      textarea.value = promptText;
      textarea.style.position = "fixed";
      textarea.style.top = "-999px";
      textarea.style.left = "-999px";
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand("copy");
        showCopyFeedback();
      } catch (err) {
        console.error("Copy failed:", err);
      }
      document.body.removeChild(textarea);
    }

    function showCopyFeedback() {
      const feedback = document.getElementById("copy-feedback");
      feedback.classList.remove("hidden");
