<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Lettering Generator PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(168, 85, 247, 0.25), transparent 30%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.22), transparent 30%),
        linear-gradient(135deg, #050816 0%, #0b1026 35%, #111827 100%);
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }

    .glass {
      background: rgba(18, 24, 46, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 12px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .field-label {
      letter-spacing: 0.08em;
    }

    .pretty-scrollbar::-webkit-scrollbar {
      width: 10px;
    }

    .pretty-scrollbar::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
    }

    .pretty-scrollbar::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #a855f7, #3b82f6);
      border-radius: 999px;
    }
  </style>
</head>
<body class="text-white">
  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-fuchsia-400 via-sky-400 to-amber-300 bg-clip-text text-transparent">
        Premium Lettering Generator PRO
      </h1>
      <p class="mt-3 text-slate-300 text-base md:text-lg">
        Create polished, eye-catching, custom lettering prompts with a working reset button.
      </p>
    </div>

    <form id="generatorForm" class="glass rounded-3xl p-6 md:p-8">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- LEFT PANEL -->
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="headline" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Headline
              </label>
              <input
                id="headline"
                name="headline"
                type="text"
                placeholder="Enter your main title"
                class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-fuchsia-400"
              />
            </div>

            <div>
              <label for="subheadline" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Subheadline
              </label>
              <input
                id="subheadline"
                name="subheadline"
                type="text"
                placeholder="Enter your subtitle"
                class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3 outline-none focus:ring-2 focus:ring-sky-400"
              />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <div>
              <label for="fontStyle" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Font Style
              </label>
              <select id="fontStyle" name="fontStyle" class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3">
                <option value="">None</option>
                <option>Art Deco</option>
                <option>Bold Sans Serif</option>
                <option>Bubble Lettering</option>
                <option>Calligraphy</option>
                <option>Cinematic Serif</option>
                <option>Classic Script</option>
                <option>Decorative Display</option>
                <option>Elegant Serif</option>
                <option>Futuristic Tech</option>
                <option>Glam Script</option>
                <option>Graffiti</option>
                <option>Handwritten</option>
                <option>Luxury Editorial</option>
                <option>Minimal Sans</option>
                <option>Modern Script</option>
                <option>Neon Display</option>
                <option>Old English</option>
                <option>Retro Signage</option>
                <option>Rounded Sans</option>
                <option>Stencil</option>
              </select>
            </div>

            <div>
              <label for="colorPalette" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Color Palette
              </label>
              <select id="colorPalette" name="colorPalette" class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3">
                <option value="">None</option>
                <option>Black and Gold</option>
                <option>Blush and Rose Gold</option>
                <option>Champagne and Ivory</option>
                <option>Cobalt and Silver</option>
                <option>Emerald and White</option>
                <option>Hot Pink and Orange</option>
                <option>Lavender and Platinum</option>
                <option>Maroon and Gray</option>
                <option>Midnight Blue and Gold</option>
                <option>Purple and Teal</option>
                <option>Red and Black</option>
                <option>Royal Blue and White</option>
              </select>
            </div>

            <div>
              <label for="finish" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Finish
              </label>
              <select id="finish" name="finish" class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3">
                <option value="">None</option>
                <option>Chrome</option>
                <option>Embossed</option>
                <option>Foil Stamped</option>
                <option>Glossy</option>
                <option>Glitter</option>
                <option>Holographic</option>
                <option>Matte</option>
                <option>Metallic</option>
                <option>Soft Glow</option>
                <option>Textured Ink</option>
              </select>
            </div>

            <div>
              <label for="mood" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Mood
              </label>
              <select id="mood" name="mood" class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3">
                <option value="">None</option>
                <option>Bold</option>
                <option>Celebratory</option>
                <option>Chic</option>
                <option>Dramatic</option>
                <option>Elegant</option>
                <option>Energetic</option>
                <option>Fun</option>
                <option>Glamorous</option>
                <option>Luxury</option>
                <option>Playful</option>
                <option>Polished</option>
                <option>Premium</option>
              </select>
            </div>

            <div>
              <label for="layout" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Layout
              </label>
              <select id="layout" name="layout" class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3">
                <option value="">None</option>
                <option>Centered</option>
                <option>Diagonal Flow</option>
                <option>Full Width Banner</option>
                <option>Layered Stack</option>
                <option>Left Aligned</option>
                <option>Magazine Cover Style</option>
                <option>Minimal Center</option>
                <option>Right Aligned</option>
                <option>Split Composition</option>
                <option>Vertical Poster</option>
              </select>
            </div>

            <div>
              <label for="backgroundEffects" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
                Background Effects
              </label>
              <select id="backgroundEffects" name="backgroundEffects" class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-3">
                <option value="">None</option>
                <option>Bokeh Lights</option>
                <option>Confetti Sparkle</option>
                <option>Crystal Glow</option>
                <option>Floating Glitter</option>
                <option>Light Rays</option>
                <option>Neon Halo</option>
                <option>Soft Clouds</option>
                <option>Starburst</option>
                <option>Studio Glow</option>
                <option>Velvet Gradient</option>
              </select>
            </div>
          </div>

          <div>
            <label for="extraNotes" class="block field-label text-xs font-bold text-slate-300 mb-2 uppercase">
              Extra Notes
            </label>
            <textarea
              id="extraNotes"
              name="extraNotes"
              rows="5"
              placeholder="Add any extra details here..."
              class="w-full rounded-2xl bg-slate-900/70 border border-white/10 px-4 py-4 outline-none focus:ring-2 focus:ring-amber-400 pretty-scrollbar"
            ></textarea>
          </div>

          <div class="flex flex-wrap gap-3 pt-2">
            <button
              type="button"
              id="generateBtn"
              class="rounded-2xl px-8 py-4 font-extrabold text-lg bg-gradient-to-r from-fuchsia-500 to-violet-500 hover:scale-[1.02] transition"
            >
              Generate
            </button>

            <button
              type="button"
              id="randomizeBtn"
              class="rounded-2xl px-8 py-4 font-extrabold text-lg bg-gradient-to-r from-sky-500 to-blue-500 hover:scale-[1.02] transition"
            >
              Randomize
            </button>

            <button
              type="button"
              id="resetBtn"
              class="rounded-2xl px-8 py-4 font-extrabold text-lg bg-slate-600 hover:bg-slate-500 transition"
            >
              Reset
            </button>

            <button
              type="button"
              id="demoBtn"
              class="rounded-2xl px-8 py-4 font-extrabold text-lg text-slate-900 bg-gradient-to-r from-amber-400 to-orange-400 hover:scale-[1.02] transition"
            >
              Demo Setup
            </button>
          </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="space-y-6">
          <div class="glass rounded-3xl p-5">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-xl font-bold text-fuchsia-300">Image Prompt Output</h2>
              <button
                type="button"
                data-copy-target="imageOutput"
                class="copy-btn rounded-xl px-4 py-2 text-sm font-bold bg-fuchsia-500/20 border border-fuchsia-300/20 hover:bg-fuchsia-500/30 transition"
              >
                Copy
              </button>
            </div>
            <textarea
              id="imageOutput"
              rows="10"
              readonly
              class="w-full rounded-2xl bg-slate-950/70 border border-white/10 px-4 py-4 text-slate-100 pretty-scrollbar"
              placeholder="Your image prompt will appear here..."
            ></textarea>
          </div>

          <div class="glass rounded-3xl p-5">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-xl font-bold text-sky-300">Video Prompt Output</h2>
              <button
                type="button"
                data-copy-target="videoOutput"
                class="copy-btn rounded-xl px-4 py-2 text-sm font-bold bg-sky-500/20 border border-sky-300/20 hover:bg-sky-500/30 transition"
              >
                Copy
              </button>
            </div>
            <textarea
              id="videoOutput"
              rows="10"
              readonly
              class="w-full rounded-2xl bg-slate-950/70 border border-white/10 px-4 py-4 text-slate-100 pretty-scrollbar"
              placeholder="Your video prompt will appear here..."
            ></textarea>
          </div>

          <div id="statusBox" class="hidden rounded-2xl border border-emerald-400/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200"></div>
        </div>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById("generatorForm");
    const generateBtn = document.getElementById("generateBtn");
    const randomizeBtn = document.getElementById("randomizeBtn");
    const resetBtn = document.getElementById("resetBtn");
    const demoBtn = document.getElementById("demoBtn");
    const imageOutput = document.getElementById("imageOutput");
    const videoOutput = document.getElementById("videoOutput");
    const statusBox = document.getElementById("statusBox");

    const fieldIds = [
      "headline",
      "subheadline",
      "fontStyle",
      "colorPalette",
      "finish",
      "mood",
      "layout",
      "backgroundEffects",
      "extraNotes"
    ];

    const selectIds = [
      "fontStyle",
      "colorPalette",
      "finish",
      "mood",
      "layout",
      "backgroundEffects"
    ];

    function getFieldValue(id) {
      return document.getElementById(id).value.trim();
    }

    function showStatus(message, type = "success") {
      statusBox.classList.remove("hidden");
      statusBox.textContent = message;

      statusBox.className = "rounded-2xl px-4 py-3 text-sm";

      if (type === "success") {
        statusBox.classList.add(
          "border", "border-emerald-400/30", "bg-emerald-500/10", "text-emerald-200"
        );
      } else if (type === "info") {
        statusBox.classList.add(
          "border", "border-sky-400/30", "bg-sky-500/10", "text-sky-200"
        );
      } else {
        statusBox.classList.add(
          "border", "border-amber-400/30", "bg-amber-500/10", "text-amber-200"
        );
      }
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "hidden";
    }

    function buildPrompt(type) {
      const headline = getFieldValue("headline");
      const subheadline = getFieldValue("subheadline");
      const fontStyle = getFieldValue("fontStyle");
      const colorPalette = getFieldValue("colorPalette");
      const finish = getFieldValue("finish");
      const mood = getFieldValue("mood");
      const layout = getFieldValue("layout");
      const backgroundEffects = getFieldValue("backgroundEffects");
      const extraNotes = getFieldValue("extraNotes");

      const parts = [];

      if (type === "image") {
        parts.push("Create premium custom lettering artwork");
      } else {
        parts.push("Create a premium animated lettering video concept");
      }

      if (headline) parts.push(`for the headline "${headline}"`);
      if (subheadline) parts.push(`with the subheadline "${subheadline}"`);
      if (fontStyle) parts.push(`using a ${fontStyle} font style`);
      if (colorPalette) parts.push(`in a ${colorPalette} color palette`);
      if (finish) parts.push(`with a ${finish.toLowerCase()} finish`);
      if (mood) parts.push(`that feels ${mood.toLowerCase()}`);
      if (layout) parts.push(`in a ${layout.toLowerCase()} layout`);
      if (backgroundEffects) parts.push(`with ${backgroundEffects.toLowerCase()} background effects`);

      if (type === "image") {
        parts.push("make it polished, eye-catching, custom-designed, premium, crisp, high-end, clean, and unforgettable");
      } else {
        parts.push("include smooth motion, premium reveal timing, elegant text animation, polished transitions, and a luxury visual feel");
      }

      if (extraNotes) parts.push(`Additional notes: ${extraNotes}`);

      return parts.join(", ") + ".";
    }

    function generatePrompts() {
      imageOutput.value = buildPrompt("image");
      videoOutput.value = buildPrompt("video");
      showStatus("Prompts generated successfully.", "success");
    }

    function randomChoice(selectElement) {
      const options = [...selectElement.options].filter(option => option.value !== "");
      const randomOption = options[Math.floor(Math.random() * options.length)];
      selectElement.value = randomOption ? randomOption.value : "";
    }

    function randomizeFields() {
      selectIds.forEach(id => {
        const select = document.getElementById(id);
        randomChoice(select);
      });

      const sampleHeadlines = [
        "Senior 2026",
        "Boss Energy",
        "Luxury Glow",
        "Queen Vibes Only",
        "Graduation Season",
        "Made to Shine"
      ];

      const sampleSubheadlines = [
        "The Journey Starts Here",
        "Custom Designed to Stand Out",
        "Bold. Polished. Unforgettable.",
        "Premium Visual Statement",
        "Made for the Spotlight",
        "Luxury Lettering Experience"
      ];

      const sampleNotes = [
        "Make the lettering feel premium, eye-catching, polished, custom-designed, and unforgettable.",
        "Keep the design clean, bold, luxurious, and highly readable.",
        "Use glamorous shine, elegant depth, and visual richness.",
        "Create a high-end custom look with crisp finishing details."
      ];

      document.getElementById("headline").value =
        sampleHeadlines[Math.floor(Math.random() * sampleHeadlines.length)];
      document.getElementById("subheadline").value =
        sampleSubheadlines[Math.floor(Math.random() * sampleSubheadlines.length)];
      document.getElementById("extraNotes").value =
        sampleNotes[Math.floor(Math.random() * sampleNotes.length)];

      clearStatus();
      showStatus("Fields randomized.", "info");
    }

    function demoSetup() {
      document.getElementById("headline").value = "Senior 2026";
      document.getElementById("subheadline").value = "The Journey Starts Here";
      document.getElementById("fontStyle").value = "Luxury Editorial";
      document.getElementById("colorPalette").value = "Emerald and White";
      document.getElementById("finish").value = "Glossy";
      document.getElementById("mood").value = "Premium";
      document.getElementById("layout").value = "Centered";
      document.getElementById("backgroundEffects").value = "Soft Glow";
      document.getElementById("extraNotes").value =
        "Make the lettering feel premium, eye-catching, polished, custom-designed, and unforgettable.";

      generatePrompts();
      showStatus("Demo setup loaded.", "info");
    }

    function resetGenerator() {
      // Reset all form fields back to their default HTML values
      form.reset();

      // Clear generated outputs
      imageOutput.value = "";
      videoOutput.value = "";

      // Clear status
      clearStatus();

      // If you ever add custom widgets, previews, counters, or toggles,
      // reset them here too.
    }

    async function copyOutput(targetId) {
      const target = document.getElementById(targetId);
      if (!target.value.trim()) {
        showStatus("Nothing to copy yet.", "warning");
        return;
      }

      try {
        await navigator.clipboard.writeText(target.value);
        showStatus("Copied to clipboard.", "success");
      } catch (error) {
        showStatus("Copy failed. Please copy manually.", "warning");
      }
    }

    generateBtn.addEventListener("click", generatePrompts);
    randomizeBtn.addEventListener("click", randomizeFields);
    demoBtn.addEventListener("click", demoSetup);
    resetBtn.addEventListener("click", resetGenerator);

    document.querySelectorAll(".copy-btn").forEach(button => {
      button.addEventListener("click", () => {
        copyOutput(button.dataset.copyTarget);
      });
    });
  </script>
</body>
</html>
