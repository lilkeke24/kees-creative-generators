<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billboard AI Art Creator PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #050814;
      --bg2: #0f1530;
      --bg3: #121f45;
      --line: rgba(255, 255, 255, .10);
      --text: #f6f7ff;
      --muted: #c0c8e8;
      --accent: #f5cc74;
      --shadow: 0 10px 35px rgba(0, 0, 0, .45);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
    
    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 204, 116, .12), transparent 22%),
        radial-gradient(circle at top right, rgba(135, 199, 255, .12), transparent 24%),
        radial-gradient(circle at bottom center, rgba(167, 139, 250, .10), transparent 25%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 55%, var(--bg3));
    }

    .font-display { font-family: 'Cinzel', serif; }
    
    .glass {
      background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .04));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .field {
      width: 100%;
      background: #0f1733;
      color: #f6f7ff;
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: 16px;
      padding: 12px 14px;
      outline: none;
      transition: .25s ease;
      font-size: 0.9rem;
    }

    .field:focus {
      border-color: rgba(245, 204, 116, .55);
      box-shadow: 0 0 0 3px rgba(245, 204, 116, .18);
    }

    .other-input {
      margin-top: 8px;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    textarea.field { min-height: 140px; resize: vertical; line-height: 1.5; font-family: monospace; font-size: 0.85rem; }

    .btn {
      border: none; border-radius: 16px; padding: 12px 16px; font-weight: 700; cursor: pointer;
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); color: white; box-shadow: var(--shadow);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }

    .btn-gold { background: linear-gradient(135deg, #f2c35f, #c68b2a); color: #1a1a1a; }
    .btn-blue { background: linear-gradient(135deg, #4ca6ff, #375dff); }
    .btn-purple { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .btn-dark { background: linear-gradient(135deg, #1c2648, #0e1732); border: 1px solid var(--line); }

    .chip {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px;
      background: rgba(255, 255, 255, .07); border: 1px solid rgba(255, 255, 255, .09); 
      color: var(--muted); font-size: .8rem; font-weight: 500;
    }

    .hero-title {
      background: linear-gradient(135deg, #fff4d2, #f5cc74, #95cbff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .sparkle {
      position: fixed; inset: 0; pointer-events: none; opacity: .4; z-index: 0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 255, 255, .8) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 30%, rgba(135, 199, 255, .8) 0 1px, transparent 2px);
      background-size: 240px 240px;
    }

    .section-title {
      font-size: .75rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; 
      color: var(--accent); margin-bottom: 8px; display: block;
    }

    .subject-header {
      background: rgba(245, 204, 116, 0.1);
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .tiny { font-size: .82rem; color: var(--muted); line-height: 1.5; }

    @media (max-width: 768px) { .stack-mobile { grid-template-columns: 1fr !important; } }
  </style>
</head>

    function createField(field, suffix = '') {
      const wrapper = document.createElement('div');
      wrapper.className = 'flex flex-col';
      const label = document.createElement('label');
      label.className = 'section-title';
      label.textContent = field.label;
      const select = document.createElement('select');
      select.id = field.id + suffix;
      select.className = 'field';
      const otherInput = document.createElement('input');
      otherInput.id = field.id + suffix + '_other';
      otherInput.className = 'field other-input hidden';
      otherInput.placeholder = `Custom ${field.label}...`;
      if (field.type === 'dynamic') {
        const opt = document.createElement('option'); opt.value = 'None'; opt.textContent = 'None';
        select.appendChild(opt);
        const optOther = document.createElement('option'); optOther.value = 'Other'; optOther.textContent = 'Other';
        select.appendChild(optOther);
      } else {
        field.options.forEach(o => {
          const opt = document.createElement('option'); opt.value = o; opt.textContent = o;
          select.appendChild(opt);
        });
      }
      select.addEventListener('change', () => {
        if (select.value === 'Other') otherInput.classList.remove('hidden');
        else otherInput.classList.add('hidden');
        if (field.id === 'gender') refreshDynamic(suffix);
        updatePrompt();
      });
      otherInput.addEventListener('input', updatePrompt);
      wrapper.appendChild(label);
      wrapper.appendChild(select);
      wrapper.appendChild(otherInput);
      return wrapper;
    }

    function refreshDynamic(suffix) {
      const gender = document.getElementById('gender' + suffix).value;
      const hairSelect = document.getElementById('hairStyle' + suffix);
      const clothSelect = document.getElementById('clothing' + suffix);
      if(!hairSelect || !clothSelect) return;
      const hOpts = (gender === 'Male') ? alpha(hairMale) : alpha(hairFemale);
      const cOpts = (gender === 'Male') ? alpha(wardMale) : alpha(wardFemale);
      const update = (sel, opts) => {
        const cur = sel.value; sel.innerHTML = '';
        opts.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
        if (opts.includes(cur)) sel.value = cur;
      };
      update(hairSelect, hOpts); update(clothSelect, cOpts);
    }

    function initGrids() {
      const s1 = document.getElementById('s1Grid');
      const s2 = document.getElementById('s2Grid');
      const scene = document.getElementById('sceneGrid');
      const coupleGrid = document.getElementById('couplePoseGrid');
      const popOutGrid = document.getElementById('popOutGrid');

      subjectFields.forEach(f => s1.appendChild(createField(f, '_1')));
      subjectFields.forEach(f => s2.appendChild(createField(f, '_2')));
      sceneFields.forEach(f => scene.appendChild(createField(f, '')));
      coupleGrid.appendChild(createField({ id:'relPose', label:'Relationship Pose', options:alpha(relPoses) }, ''));
      popOutGrid.appendChild(createField({ id:'popOut', label:'', options:alpha(popOutEffects) }, ''));

      refreshDynamic('_1'); refreshDynamic('_2');
    }

    function getVal(id) {
      const sel = document.getElementById(id);
      if (!sel) return 'None';
      if (sel.value === 'Other') {
        const other = document.getElementById(id + '_other');
        return other ? other.value : 'None';
      }
      return sel.value;
    }

    function suggestSingle(targetId) {
      const mood = getVal('mood');
      const style = getVal('artStyle');
      const count = document.getElementById('subjectCount').value;
      
      let category = 'default';
      if (mood !== 'None' && slogans[mood]) category = mood;
      else if (style && style.includes('Cyberpunk')) category = 'Cyberpunk';
      else if (count === 'Couple') category = 'Couple';

      const list = targetId === 'headline' ? slogans[category].h : slogans[category].s;
      const pick = list[Math.floor(Math.random() * list.length)];
      document.getElementById(targetId).value = pick;
      updatePrompt();
    }

    function buildCharDesc(suffix) {
      const gender = getVal('gender' + suffix);
      if (gender === 'None') return null;
      const traits = [getVal('age' + suffix) !== 'None' ? `${getVal('age' + suffix)}-year-old` : '', getVal('race' + suffix) !== 'None' ? getVal('race' + suffix) : '', gender.toLowerCase()].filter(t => t).join(' ');
      return `${traits} with ${getVal('skinTone' + suffix).toLowerCase()} skin, ${getVal('hairStyle' + suffix).toLowerCase()} hair, wearing ${getVal('clothing' + suffix).toLowerCase()}, holding a ${getVal('expression' + suffix).toLowerCase()} expression`;
    }

    function updatePrompt() {
      const count = document.getElementById('subjectCount').value;
      const popOut = getVal('popOut');
      const h1 = document.getElementById('headline').value.trim();
      const h2 = document.getElementById('subheadline').value.trim();
      
      let subStr = "";
      if (count === 'Single') {
        const desc = buildCharDesc('_1'); subStr = desc ? `portrait of a ${desc}` : 'portrait of a person';
      } else {
        const d1 = buildCharDesc('_1') || 'first subject'; const d2 = buildCharDesc('_2') || 'second subject';
        const pose = getVal('relPose'); const poseP = (pose !== 'None') ? ` in a ${pose.toLowerCase()} relationship pose` : '';
        subStr = `portrait of a couple featuring a ${d1} and a ${d2}${poseP}`;
      }

      const popOutPart = (popOut !== 'None' && !popOut.includes('Entirely Inside')) ? `featuring an eye-popping 3D out-of-bounds effect where the subject is ${popOut.toLowerCase()}` : 'the entire subject is contained within the billboard frame';

      const cParts = [
        `set inside a massive ${getVal('billboardType')} in ${getVal('city')}`,
        popOutPart,
        h1 ? `headline reads “${h1}”` : '',
        h2 ? `subheadline reads “${h2}”` : '',
        `surrounded by ${getVal('backgroundElements')}`,
        `lighting: ${getVal('lighting')}`,
        `palette: ${getVal('colorPalette')}`,
        `angle: ${getVal('cameraAngle')}`,
        `art direction: ${getVal('artStyle')}`,
        `mood: ${getVal('mood')}`,
        `quality: ${getVal('quality')}, hyper-realistic luxury campaign.`
      ];

      const bImg = 'Create an ultra-premium vertical billboard fantasy portrait';
      document.getElementById('outputImage').value = `${bImg} of a ${subStr}, ${cParts.filter(p => p && !p.includes('None')).join(', ')}`.replace(/\s+/g, ' ').trim();
      
      const bVid = 'Create a cinematic vertical billboard video';
      const m = getVal('videoMotion'); const mP = (m !== 'None') ? `, cinematic motion: ${m.toLowerCase()}` : '';
      document.getElementById('outputVideo').value = `${bVid} of a ${subStr}, ${cParts.filter(p => p && !p.includes('None')).join(', ')}${mP}`.replace(/\s+/g, ' ').trim();
    }

    function copy(id) {
      const el = document.getElementById(id); el.select(); document.execCommand('copy');
      const btn = event.target; const old = btn.textContent; btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = old, 1200);
    }

    document.getElementById('subjectCount').addEventListener('change', (e) => {
      const s2 = document.getElementById('subject2Section'); const relC = document.getElementById('couplePoseContainer');
      if (e.target.value === 'Couple') { s2.classList.remove('hidden'); relC.classList.remove('hidden'); }
      else { s2.classList.add('hidden'); relC.classList.add('hidden'); }
      updatePrompt();
    });

    document.getElementById('headline').addEventListener('input', updatePrompt);
    document.getElementById('subheadline').addEventListener('input', updatePrompt);
    document.getElementById('randomBtn').addEventListener('click', () => {
      document.querySelectorAll('select.field').forEach(s => { if (s.options.length > 2) s.selectedIndex = Math.floor(Math.random() * (s.options.length - 2)) + 1; });
      refreshDynamic('_1'); refreshDynamic('_2'); updatePrompt();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.querySelectorAll('select.field').forEach(s => s.selectedIndex = 0);
      document.querySelectorAll('.other-input').forEach(i => i.classList.add('hidden'));
      document.getElementById('headline').value = ''; document.getElementById('subheadline').value = ''; updatePrompt();
    });
    document.getElementById('suggestSlogansBtn').addEventListener('click', () => { suggestSingle('headline'); suggestSingle('subheadline'); });

    initGrids(); updatePrompt();
  </script>
</body>
</html>
